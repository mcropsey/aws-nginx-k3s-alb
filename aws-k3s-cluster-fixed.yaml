AWSTemplateFormatVersion: '2010-09-09'
Description: mcropsey-lab K3s Cluster with SSH Key Authentication and Sudo Access

Parameters:
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 key pair for SSH access to instances

  AlmaLinux9AMIId:
    Type: String
    Default: ami-0123456789abcdefg # Replace with your AlmaLinux 9 AMI ID

  AdminIPRange:
    Type: String
    Default: "192.0.2.0/32" # Replace with your IP for SSH access

Resources:

  # === VPC & Networking === #
  mcropseylabVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true

  mcropseylabIGW:
    Type: AWS::EC2::InternetGateway

  mcropseylabVPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref mcropseylabVPC
      InternetGatewayId: !Ref mcropseylabIGW

  mcropseylabPublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref mcropseylabVPC

  mcropseylabPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: mcropseylabVPCGatewayAttachment
    Properties:
      RouteTableId: !Ref mcropseylabPublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref mcropseylabIGW

  mcropseylabSubnetPublicA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref mcropseylabVPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true

  mcropseylabSubnetPublicB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref mcropseylabVPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true

  mcropseylabSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref mcropseylabSubnetPublicA
      RouteTableId: !Ref mcropseylabPublicRouteTable

  mcropseylabSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref mcropseylabSubnetPublicB
      RouteTableId: !Ref mcropseylabPublicRouteTable

  # === Security Groups === #
  mcropseylabClusterSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: mcropsey-lab-cluster-sg
      GroupDescription: K3s control plane security group (SSH, k3s API, ICMP)
      VpcId: !Ref mcropseylabVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AdminIPRange
        - IpProtocol: tcp
          FromPort: 6443
          ToPort: 6443
          CidrIp: !Ref AdminIPRange
        - IpProtocol: icmp
          FromPort: -1
          ToPort: -1
          CidrIp: 0.0.0.0/0

      SecurityGroupEgress:
        - IpProtocol: all
          CidrIp: 0.0.0.0/0

      Tags:
        - Key: Project
          Value: mcropsey-lab-K3s-Cluster

  mcropseylabNginxSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: mcropsey-lab-nginx-sg
      GroupDescription: Nginx ingress security group (HTTP, HTTPS, SSH)
      VpcId: !Ref mcropseylabVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AdminIPRange

      SecurityGroupEgress:
        - IpProtocol: all
          CidrIp: 0.0.0.0/0

      Tags:
        - Key: Project
          Value: mcropsey-lab-K3s-Cluster

  # Allow the Nginx instance to reach the control plane's k3s ingress (Traefik on 80/443)
  mcropseylabClusterSGIngressFromNginx80:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !GetAtt mcropseylabClusterSG.GroupId
      IpProtocol: tcp
      FromPort: 80
      ToPort: 80
      SourceSecurityGroupId: !GetAtt mcropseylabNginxSG.GroupId

  mcropseylabClusterSGIngressFromNginx443:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !GetAtt mcropseylabClusterSG.GroupId
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      SourceSecurityGroupId: !GetAtt mcropseylabNginxSG.GroupId

  # === K3s Control Plane === #
  mcropseylabControlPlaneInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.medium
      ImageId: !Ref AlmaLinux9AMIId
      KeyName: !Ref KeyPairName
      SubnetId: !Ref mcropseylabSubnetPublicA
      SecurityGroupIds:
        - !GetAtt mcropseylabClusterSG.GroupId

      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          exec > >(tee /var/log/user-data.log | logger -t user-data -s 2>/dev/console) 2>&1

          useradd -m -s /bin/bash mcropsey
          install -d -m 700 -o mcropsey -g mcropsey /home/mcropsey/.ssh
          cp /home/ec2-user/.ssh/authorized_keys /home/mcropsey/.ssh/authorized_keys
          chown mcropsey:mcropsey /home/mcropsey/.ssh/authorized_keys
          chmod 600 /home/mcropsey/.ssh/authorized_keys

          cat > /etc/sudoers.d/mcropsey <<'SUDOERS'
          mcropsey ALL=(ALL) NOPASSWD: ALL
          SUDOERS
          chmod 440 /etc/sudoers.d/mcropsey

          systemctl stop firewalld || true
          systemctl disable firewalld || true
          sed -i 's/SELINUX=enforcing/SELINUX=permissive/' /etc/selinux/config
          setenforce 0 || true

          TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 60")
          PUBLIC_IP=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/public-ipv4)

          curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="server --write-kubeconfig-mode 644 --tls-san ${!PUBLIC_IP}" sh -

          mkdir -p /home/mcropsey/.kube
          cp /etc/rancher/k3s/k3s.yaml /home/mcropsey/.kube/config
          chown -R mcropsey:mcropsey /home/mcropsey/.kube
      Tags:
        - Key: Project
          Value: mcropsey-lab-K3s-Cluster
        - Key: Name
          Value: mcropsey-lab-control-plane

    DependsOn: mcropseylabClusterSG

  # === Nginx Ingress === #
  mcropseylabNginxInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.small
      ImageId: !Ref AlmaLinux9AMIId
      KeyName: !Ref KeyPairName
      SubnetId: !Ref mcropseylabSubnetPublicA
      SecurityGroupIds:
        - !GetAtt mcropseylabNginxSG.GroupId

      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          exec > >(tee /var/log/user-data.log | logger -t user-data -s 2>/dev/console) 2>&1

          useradd -m -s /bin/bash mcropsey
          install -d -m 700 -o mcropsey -g mcropsey /home/mcropsey/.ssh
          cp /home/ec2-user/.ssh/authorized_keys /home/mcropsey/.ssh/authorized_keys
          chown mcropsey:mcropsey /home/mcropsey/.ssh/authorized_keys
          chmod 600 /home/mcropsey/.ssh/authorized_keys

          cat > /etc/sudoers.d/mcropsey <<'SUDOERS'
          mcropsey ALL=(ALL) NOPASSWD: ALL
          SUDOERS
          chmod 440 /etc/sudoers.d/mcropsey

          systemctl stop firewalld || true
          systemctl disable firewalld || true
          sed -i 's/SELINUX=enforcing/SELINUX=permissive/' /etc/selinux/config
          setenforce 0 || true

          yum install -y nginx

          cat > /etc/nginx/conf.d/default.conf <<'NGINXCONF'
          server {
              listen 80;
              location / {
                  proxy_pass https://${mcropseylabControlPlaneInstance.PrivateIp}:443;
                  proxy_ssl_verify off;
                  proxy_set_header Host ${!host};
                  proxy_set_header X-Real-IP ${!remote_addr};
              }
          }
          NGINXCONF

          systemctl enable --now nginx
      Tags:
        - Key: Project
          Value: mcropsey-lab-K3s-Cluster
        - Key: Name
          Value: mcropsey-lab-nginx

    DependsOn: mcropseylabControlPlaneInstance

  # === Outputs === #
Outputs:
  NginxPublicIP:
    Description: Public IP of the Nginx Ingress server (mcropsey-lab-nginx-instance)
    Value: !GetAtt mcropseylabNginxInstance.PublicIp

  ControlPlanePublicIP:
    Description: Public IP of the K3s control plane instance
    Value: !GetAtt mcropseylabControlPlaneInstance.PublicIp

  ControlPlanePrivateIP:
    Description: Private IP of the K3s control plane instance (used by Nginx proxy)
    Value: !GetAtt mcropseylabControlPlaneInstance.PrivateIp
